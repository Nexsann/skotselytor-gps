name: Build Skötselytor GPS APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Create Android project
        run: |
          rm -rf app
          mkdir -p app/src/main/java/se/skotselytor/gps
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "SkotselytorGPS"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.7.3" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "se.skotselytor.gps"
              compileSdk 35

              defaultConfig {
                  applicationId "se.skotselytor.gps"
                  minSdk 26
                  targetSdk 35
                  versionCode 10
                  versionName "2.0"
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">#22c55e</item>
                  <item name="android:navigationBarColor">#0b1220</item>
                  <item name="android:statusBarColor">#082e5c</item>
                  <item name="android:windowLightStatusBar">false</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION"/>

              <application
                  android:theme="@style/AppTheme"
                  android:label="Skötselytor GPS"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".LocationForegroundService"
                      android:foregroundServiceType="location"
                      android:exported="false"/>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/se/skotselytor/gps/MainActivity.java <<'EOF'
          package se.skotselytor.gps;

          import android.Manifest;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.content.pm.PackageManager;
          import android.os.Bundle;
          import android.webkit.GeolocationPermissions;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.content.Intent;
          import android.content.Context;

          public class MainActivity extends Activity {
              private static final int LOCATION_REQUEST = 1001;
              private WebView webView;
              private GeolocationPermissions.Callback geoCallback;
              private String geoOrigin;

              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  if (checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(new String[] {
                          Manifest.permission.ACCESS_FINE_LOCATION,
                          Manifest.permission.ACCESS_COARSE_LOCATION,
                          Manifest.permission.ACCESS_BACKGROUND_LOCATION
                      }, LOCATION_REQUEST);
                  }

                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setGeolocationEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);

                  webView.addJavascriptInterface(new WebAppInterface(this), "Android");

                  webView.setWebViewClient(new WebViewClient());

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onGeolocationPermissionsShowPrompt(String origin, GeolocationPermissions.Callback callback) {
                          geoOrigin = origin;
                          geoCallback = callback;

                          boolean granted =
                              checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) == PackageManager.PERMISSION_GRANTED ||
                              checkSelfPermission(Manifest.permission.ACCESS_COARSE_LOCATION) == PackageManager.PERMISSION_GRANTED;

                          if (granted) {
                              callback.invoke(origin, true, false);
                          } else {
                              requestPermissions(new String[] {
                                  Manifest.permission.ACCESS_FINE_LOCATION,
                                  Manifest.permission.ACCESS_COARSE_LOCATION,
                                  Manifest.permission.ACCESS_BACKGROUND_LOCATION
                              }, LOCATION_REQUEST);
                          }
                      }
                  });

                  webView.loadUrl("file:///android_asset/index.html");
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);

                  if (requestCode == LOCATION_REQUEST) {
                      boolean granted = false;
                      for (int result : grantResults) {
                          if (result == PackageManager.PERMISSION_GRANTED) {
                              granted = true;
                              break;
                          }
                      }

                      if (geoCallback != null && geoOrigin != null) {
                          geoCallback.invoke(geoOrigin, granted, false);
                          geoCallback = null;
                          geoOrigin = null;
                      }
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }

              public void startBackgroundTracking() {
                  Intent intent = new Intent(this, LocationForegroundService.class);
                  startService(intent);
              }

              public void stopBackgroundTracking() {
                  Intent intent = new Intent(this, LocationForegroundService.class);
                  stopService(intent);
              }
          }
          EOF

          cat > app/src/main/java/se/skotselytor/gps/LocationForegroundService.java <<'EOF'
          package se.skotselytor.gps;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.location.Location;
          import android.location.LocationListener;
          import android.location.LocationManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.IBinder;
          import androidx.annotation.Nullable;

          public class LocationForegroundService extends Service {
              private static final String CHANNEL_ID = "skotselytor_gps_channel";
              private LocationManager locationManager;
              private LocationListener locationListener;

              @Override
              public void onCreate() {
                  super.onCreate();
                  createNotificationChannel();
                  startForeground(1, getNotification());

                  locationManager = (LocationManager) getSystemService(LOCATION_SERVICE);

                  locationListener = new LocationListener() {
                      @Override
                      public void onLocationChanged(Location location) {
                          // TODO: Skicka till WebView eller spara lokalt
                      }

                      @Override
                      public void onStatusChanged(String provider, int status, Bundle extras) {}
                      @Override
                      public void onProviderEnabled(String provider) {}
                      @Override
                      public void onProviderDisabled(String provider) {}
                  };

                  if (checkSelfPermission(android.Manifest.permission.ACCESS_FINE_LOCATION) == PackageManager.PERMISSION_GRANTED) {
                      locationManager.requestLocationUpdates(LocationManager.GPS_PROVIDER, 5000, 5, locationListener);
                  }
              }

              private Notification getNotification() {
                  Intent notificationIntent = new Intent(this, MainActivity.class);
                  PendingIntent pendingIntent = PendingIntent.getActivity(this, 0, notificationIntent, PendingIntent.FLAG_IMMUTABLE);

                  return new Notification.Builder(this, CHANNEL_ID)
                          .setContentTitle("Skötselytor GPS")
                          .setContentText("Spårning aktiv i bakgrunden")
                          .setSmallIcon(android.R.drawable.ic_menu_mylocation)
                          .setContentIntent(pendingIntent)
                          .build();
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel serviceChannel = new NotificationChannel(
                              CHANNEL_ID,
                              "GPS Spårning",
                              NotificationManager.IMPORTANCE_LOW
                      );
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      manager.createNotificationChannel(serviceChannel);
                  }
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  return START_STICKY;
              }

              @Override
              public void onDestroy() {
                  if (locationManager != null && locationListener != null) {
                      locationManager.removeUpdates(locationListener);
                  }
                  stopForeground(true);
                  super.onDestroy();
              }

              @Nullable
              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }
          }
          EOF

          cat > app/src/main/java/se/skotselytor/gps/WebAppInterface.java <<'EOF'
          package se.skotselytor.gps;

          import android.webkit.JavascriptInterface;

          public class WebAppInterface {
              private MainActivity activity;

              public WebAppInterface(MainActivity activity) {
                  this.activity = activity;
              }

              @JavascriptInterface
              public void startBackgroundTracking() {
                  activity.startBackgroundTracking();
              }

              @JavascriptInterface
              public void stopBackgroundTracking() {
                  activity.stopBackgroundTracking();
              }
          }
          EOF

          cat > app/src/main/assets/index.html <<'EOF'
          <!doctype html>
          <html lang="sv">
          <head>
            <meta charset="utf-8"/>
            <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
            <title>Skötselytor GPS</title>
            <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
            <script src="https://js.arcgis.com/4.31/"></script>
            <style> [stora CSS som tidigare] </style>
          </head>
          <body>
            [HTML som tidigare]
            <script>
              // Lägg till i JS:
              // document.getElementById("trackBtn").onclick = function() {
              //   if (tracking) {
              //     stopTrack();
              //     if (typeof Android !== "undefined") Android.stopBackgroundTracking();
              //   } else {
              //     startTrack();
              //     if (typeof Android !== "undefined") Android.startBackgroundTracking();
              //   }
              // };
            </script>
          </body>
          </html>
          EOF

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: skotselytor-gps-apk
          path: app/build/outputs/apk/debug/app-debug.apk

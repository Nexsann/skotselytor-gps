<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Skötselytor GPS</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.31/"></script>
  <style>
    :root {
      color-scheme: dark;
    }
    html, body, #viewDiv {
      margin:0; padding:0; height:100%; width:100%; overflow:hidden;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background:#0b1220;
      /* Rendering-hintar: låter WebView/GPU:n rita om detta lager separat och
         så smidigt enheten tillåter, i stället för att synkas mot resten av
         sidan. Hjälper på 90/120Hz-skärmar. */
      -webkit-font-smoothing:antialiased;
    }
    #viewDiv { will-change: transform; }

    .topbar {
      position:fixed; top:0; left:0; right:0; z-index:20;
      display:flex; gap:8px; align-items:center;
      padding:calc(env(safe-area-inset-top, 0px) + 10px) 12px 10px;
      background:rgba(10,14,24,.72);
      -webkit-backdrop-filter:blur(18px) saturate(150%);
      backdrop-filter:blur(18px) saturate(150%);
      border-bottom:1px solid rgba(255,255,255,.08);
      color:white;
    }
    .brand { display:flex; align-items:center; gap:9px; flex:1; min-width:0; }
    .brand-dot {
      width:9px; height:9px; border-radius:50%; background:#22c55e; flex:none;
      box-shadow:0 0 0 4px rgba(34,197,94,.18);
    }
    .brand-dot.off { background:#64748b; box-shadow:0 0 0 4px rgba(100,116,139,.18); }
    .title { min-width:0; line-height:1.15; }
    .title b { display:block; font-size:14.5px; font-weight:700; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .title span { display:block; font-size:10.5px; color:rgba(255,255,255,.55); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .toolbar { display:flex; gap:6px; }
    .iconbtn {
      border:0; border-radius:12px; width:40px; height:40px;
      display:flex; align-items:center; justify-content:center;
      background:rgba(255,255,255,.08); color:white; cursor:pointer;
      transition:background .15s ease, transform .1s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .iconbtn:active { transform:scale(.92); }
    .iconbtn svg { width:19px; height:19px; }
    .iconbtn.active { background:#ef4444; color:white; }
    .iconbtn.tracking { background:#f59e0b; color:#1c1300; }
    .iconbtn.gps-on { background:#22c55e; color:#052e16; }

    .legend {
      position:fixed; z-index:18;
      top:calc(env(safe-area-inset-top, 0px) + 62px); right:10px;
      background:rgba(15,20,30,.72);
      -webkit-backdrop-filter:blur(16px) saturate(150%);
      backdrop-filter:blur(16px) saturate(150%);
      color:white; border:1px solid rgba(255,255,255,.08);
      border-radius:16px; padding:10px 12px;
      font-size:11.5px; line-height:1.75;
      box-shadow:0 12px 28px rgba(0,0,0,.28);
    }
    .legend .gpsRow { font-weight:700; margin-bottom:4px; opacity:.9; }
    .legend hr { border:0; border-top:1px solid rgba(255,255,255,.12); margin:5px 0; }
    .legend .row { display:flex; align-items:center; gap:7px; }
    .legend .sw { width:9px; height:9px; border-radius:50%; flex:none; }

    .panel {
      position:fixed; left:0; right:0; bottom:0; z-index:30;
      background:#111826; color:white;
      border-radius:22px 22px 0 0;
      box-shadow:0 -12px 40px rgba(0,0,0,.4);
      display:none; overflow:hidden; max-height:62vh;
      border-top:1px solid rgba(255,255,255,.08);
      transform:translateY(8px);
      opacity:0;
      transition:transform .18s cubic-bezier(.2,.8,.2,1), opacity .18s ease;
      padding-bottom:env(safe-area-inset-bottom, 0px);
    }
    .panel.open { display:block; transform:translateY(0); opacity:1; }
    .panelHead {
      padding:16px 16px 12px; border-bottom:1px solid rgba(255,255,255,.08);
      display:flex; justify-content:space-between; gap:10px; align-items:flex-start;
    }
    .panelHandle {
      width:36px; height:4px; border-radius:99px; background:rgba(255,255,255,.2);
      margin:8px auto 0;
    }
    .panelHead h2 { margin:0; font-size:16.5px; font-weight:700; }
    .panelHead small { display:block; color:rgba(255,255,255,.5); margin-top:3px; font-size:12px; }
    .panelHead button.close {
      border:0; background:rgba(255,255,255,.08); color:white;
      width:30px; height:30px; border-radius:50%; font-size:16px; cursor:pointer;
      flex:none;
    }
    .panelBody { padding:14px 16px; overflow:auto; max-height:calc(62vh - 70px); }
    .meta { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
    .meta div { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:8px 10px; min-width:0; }
    .meta b { display:block; font-size:9.5px; color:rgba(255,255,255,.45); text-transform:uppercase; letter-spacing:.04em; }
    .meta span { display:block; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
    input, textarea, select {
      width:100%; box-sizing:border-box; border:1px solid rgba(255,255,255,.12);
      border-radius:12px; padding:11px; margin-top:8px; font:inherit; font-size:14px;
      background:rgba(255,255,255,.05); color:white;
    }
    input::placeholder, textarea::placeholder { color:rgba(255,255,255,.35); }
    select { -webkit-appearance:none; appearance:none; }
    .statuses { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .statuses button {
      border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.05); color:white;
      border-radius:13px; padding:11px; font-weight:700; font-size:13px; cursor:pointer;
    }
    .statuses button.active { outline:2px solid #38bdf8; background:rgba(56,189,248,.15); }
    .save { width:100%; margin-top:12px; background:#2563eb; color:white; border-radius:13px; padding:13px; font-weight:800; border:0; cursor:pointer; }
    .delete { width:100%; margin-top:8px; background:rgba(239,68,68,.15); color:#fca5a5; border-radius:13px; padding:12px; font-weight:700; border:0; cursor:pointer; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
    .mini { background:rgba(255,255,255,.08); color:white; border-radius:13px; border:0; padding:11px; font-weight:700; font-size:12.5px; cursor:pointer; }
    .hidden { display:none !important; }
    .toast {
      position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(6px);
      z-index:80; background:rgba(2,6,23,.92); color:white; border-radius:999px;
      padding:11px 18px; font-weight:700; font-size:13px; opacity:0;
      transition:opacity .18s ease, transform .18s ease; white-space:nowrap;
      border:1px solid rgba(255,255,255,.1);
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .hint, .gpsWarn {
      position:fixed; left:50%; transform:translateX(-50%);
      z-index:70; color:white; border-radius:999px;
      padding:10px 16px; font-size:12.5px; font-weight:700;
      box-shadow:0 10px 25px rgba(0,0,0,.3);
      display:none;
    }
    .hint { top:calc(env(safe-area-inset-top, 0px) + 68px); background:#ef4444; }
    .gpsWarn { bottom:88px; background:#f59e0b; color:#1c1300; }
    .hint.show, .gpsWarn.show { display:block; }

    /* Kompassnål som visas ovanpå GPS-lägesknappen när kartan följer riktning */
    .compass { transition: transform .12s linear; }
  </style>
</head>
<body>
  <div id="viewDiv"></div>

  <div class="topbar">
    <div class="brand">
      <div class="brand-dot off" id="gpsDot"></div>
      <div class="title">
        <b>Skötselytor GPS</b>
        <span id="statusLine">GPS ej aktiv</span>
      </div>
    </div>
    <div class="toolbar">
      <button class="iconbtn" id="pinBtn" title="Ny nål" aria-label="Ny nål">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.2-7-11a7 7 0 0 1 14 0c0 4.8-7 11-7 11z"/><circle cx="12" cy="10" r="2.4"/></svg>
      </button>
      <button class="iconbtn" id="pinGpsBtn" title="Nål på min position" aria-label="Nål på min position">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.2-7-11a7 7 0 0 1 14 0c0 4.8-7 11-7 11z"/><circle cx="12" cy="10" r="2.4"/><path d="M12 6v2M12 12v2M9 10h2M13 10h2"/></svg>
      </button>
      <button class="iconbtn" id="trackBtn" title="Starta/stoppa spårning" aria-label="Starta/stoppa spårning">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.6" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="iconbtn" id="gpsBtn" title="Centrera på GPS" aria-label="Centrera på GPS">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="compass" id="gpsIcon"><path d="M12 3l2.4 7.6L22 13l-7.6 2.4L12 23l-2.4-7.6L2 13l7.6-2.4L12 3z"/></svg>
      </button>
    </div>
  </div>

  <div class="hint" id="pinHint">Nålläge aktivt – tryck på kartan för att placera</div>
  <div class="gpsWarn" id="gpsWarn">GPS osäker – sparas ej</div>

  <div class="legend">
    <div class="gpsRow" id="gpsInfo">GPS: ej aktiv</div>
    <hr>
    <div class="row"><span class="sw" style="background:#38bdf8"></span> Egna nålar</div>
    <div class="row"><span class="sw" style="background:#e2e8f0"></span> Ej klippt</div>
    <div class="row"><span class="sw" style="background:#f59e0b"></span> Pågår</div>
    <div class="row"><span class="sw" style="background:#22c55e"></span> Klippt</div>
    <div class="row"><span class="sw" style="background:#ef4444"></span> Problem</div>
  </div>

  <div class="panel" id="areaPanel">
    <div class="panelHandle"></div>
    <div class="panelHead">
      <div>
        <h2 id="areaTitle">Vald yta</h2>
        <small>Klippstatus för vald skötselyta</small>
      </div>
      <button class="close" id="closeArea">×</button>
    </div>
    <div class="panelBody">
      <div class="meta">
        <div><b>ID</b><span id="mId">-</span></div>
        <div><b>Typ</b><span id="mType">-</span></div>
        <div><b>Team</b><span id="mTeam">-</span></div>
        <div><b>Distrikt</b><span id="mDistrict">-</span></div>
      </div>
      <input id="worker" placeholder="Ditt namn">
      <div class="statuses">
        <button data-status="Ej klippt">Ej klippt</button>
        <button data-status="Pågår">Pågår</button>
        <button data-status="Klippt">Klippt</button>
        <button data-status="Problem">Problem</button>
      </div>
      <textarea id="comment" rows="3" placeholder="Kommentar"></textarea>
      <button class="save" id="saveAreaBtn">Spara status</button>
    </div>
  </div>

  <div class="panel" id="pinPanel">
    <div class="panelHandle"></div>
    <div class="panelHead">
      <div>
        <h2 id="pinTitle">Egen nål</h2>
        <small id="pinSub">Kommentar/avvikelse på kartan</small>
      </div>
      <button class="close" id="closePin">×</button>
    </div>
    <div class="panelBody">
      <div class="meta">
        <div><b>X/Lon</b><span id="pinX">-</span></div>
        <div><b>Y/Lat</b><span id="pinY">-</span></div>
      </div>
      <select id="pinType">
        <option value="Handjagare krävs">Handjagare krävs</option>
        <option value="Hinder">Hinder</option>
        <option value="Går ej klippa">Går ej klippa</option>
        <option value="Behöver kollas">Behöver kollas</option>
        <option value="Annat">Annat</option>
      </select>
      <textarea id="pinComment" rows="4" placeholder="Kommentar, t.ex. Handjagare krävs runt stolpar"></textarea>
      <select id="pinStatus">
        <option value="Öppen">Öppen</option>
        <option value="Fixad">Fixad</option>
      </select>
      <div class="row">
        <button class="mini" id="movePinCenterBtn">Flytta till mitten</button>
        <button class="mini" id="movePinGpsBtn">Flytta till GPS</button>
      </div>
      <button class="save" id="savePinBtn">Spara nål</button>
      <button class="delete hidden" id="deletePinBtn">Ta bort nål</button>
    </div>
  </div>

  <div class="toast" id="toast">Sparat</div>

  <script>
    require([
      "esri/config",
      "esri/WebMap",
      "esri/views/MapView",
      "esri/layers/FeatureLayer",
      "esri/layers/GraphicsLayer",
      "esri/Graphic",
      "esri/geometry/Polyline",
      "esri/geometry/geometryEngine"
    ], function(esriConfig, WebMap, MapView, FeatureLayer, GraphicsLayer, Graphic, Polyline, geometryEngine) {
      esriConfig.portalUrl = "https://kartor.linkoping.se/portal";

      const WEBMAP_ID = "4811ba982b9e4a97b01cf4353224374b";
      const LAYER_URL = "https://kartor.linkoping.se/arcgis/rest/services/sts_omradeskarta/sts_skotselkartan_l/MapServer/32";

      const STORE_KEY = "skotselytor_status_v1";
      const TRACK_KEY = "skotselytor_track_v2";
      const PINS_KEY = "skotselytor_pins_v2";

      const GOOD_ACCURACY = 30;
      const BAD_ACCURACY = 80;
      const IMPOSSIBLE_JUMP_METERS = 70;
      const MIN_TRACK_DISTANCE_METERS = 3;

      // Hur ofta (ms) den tunga noggrannhetscirkeln räknas om. GPS-punkten
      // själv animeras separat och mycket oftare (se ANIM_FRAME_MS).
      const ACCURACY_REDRAW_INTERVAL_MS = 1200;

      // Mjuk animering av GPS-punkten mellan två mätningar, likt Google Maps,
      // i stället för att hoppa direkt till varje ny koordinat.
      const ANIM_DURATION_MS = 450;

      let selectedArea = null;
      let selectedPinId = null;
      let pendingPinGeometry = null;
      let areaStatus = "Ej klippt";
      let watchId = null;
      let tracking = false;
      let addPinMode = false;
      let followGps = false;
      let rotateWithHeading = false;
      let gpsGraphic = null;
      let accGraphic = null;
      let lineGraphic = null;
      let lastGpsPoint = null;
      let lastHeading = null;

      // Animationstillstånd för mjuk GPS-rörelse
      let animFrom = null;
      let animTo = null;
      let animStart = 0;
      let animRAF = null;
      let lastAccuracyDrawAt = 0;

      const statuses = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
      let track = JSON.parse(localStorage.getItem(TRACK_KEY) || "[]");
      let pins = JSON.parse(localStorage.getItem(PINS_KEY) || "[]");

      const statusLayer = new GraphicsLayer({ title:"Klippstatus" });
      const trackLayer = new GraphicsLayer({ title:"GPS-spår" });

      const webmap = new WebMap({
        portalItem: {
          id: WEBMAP_ID,
          portal: { url: "https://kartor.linkoping.se/portal" }
        }
      });

      const skotselLayer = new FeatureLayer({
        url: LAYER_URL,
        outFields:["*"],
        opacity:0.18,
        popupEnabled:false,
        popupTemplate:null,
        renderer:{
          type:"simple",
          symbol:{
            type:"simple-fill",
            color:[0,0,0,0],
            outline:{ color:[8,46,92,.7], width:.7 }
          }
        }
      });

      webmap.layers.addMany([skotselLayer, statusLayer, trackLayer]);

      const view = new MapView({
        container:"viewDiv",
        map:webmap,
        padding:{ top:70 },
        constraints:{ snapToZoom:false, rotationEnabled:true },
        popupEnabled:false
      });

      view.popupEnabled = false;
      try { view.popup.autoOpenEnabled = false; } catch(_) {}

      view.when(() => {
        try {
          webmap.allLayers.forEach(layer => {
            try { layer.popupEnabled = false; layer.popupTemplate = null; } catch(_) {}
            if (layer.layers) {
              layer.layers.forEach(sublayer => {
                try { sublayer.popupEnabled = false; sublayer.popupTemplate = null; } catch(_) {}
              });
            }
          });
        } catch(_) {}
        redrawTrack();
        redrawPins();
        showToast("Kartan är redo");
      });

      // ---------- Knappar ----------
      document.getElementById("gpsBtn").onclick = onGpsButtonTap;
      document.getElementById("trackBtn").onclick = toggleTrack;
      document.getElementById("pinBtn").onclick = togglePinMode;
      document.getElementById("pinGpsBtn").onclick = createPinAtGps;
      document.getElementById("closeArea").onclick = () => closeAreaPanel();
      document.getElementById("closePin").onclick = closePinPanel;
      document.getElementById("movePinCenterBtn").onclick = () => {
        pendingPinGeometry = view.center.clone().toJSON();
        updatePinCoordsText(pendingPinGeometry);
        showToast("Nål flyttad till kartans mitt");
      };
      document.getElementById("movePinGpsBtn").onclick = () => {
        if (!lastGpsPoint) { showToast("Ingen GPS-position ännu"); return; }
        pendingPinGeometry = makeGpsGeometry(lastGpsPoint);
        updatePinCoordsText(pendingPinGeometry);
        showToast("Nål flyttad till GPS");
      };

      document.querySelectorAll("[data-status]").forEach(b => {
        b.onclick = () => {
          areaStatus = b.dataset.status;
          markAreaStatus();
        };
      });

      document.getElementById("saveAreaBtn").onclick = () => {
        if (!selectedArea) return;
        const a = selectedArea.attributes || {};
        const id = a.OBJECTID;
        statuses[id] = {
          id,
          status:areaStatus,
          worker:document.getElementById("worker").value,
          comment:document.getElementById("comment").value,
          savedAt:new Date().toISOString(),
          subtyp:a.SUBTYP || "",
          team:a.TEAM || a.Team || "",
          distrikt:a.DISTRIKT || ""
        };
        localStorage.setItem(STORE_KEY, JSON.stringify(statuses));
        showToast("Status sparad");
      };

      document.getElementById("savePinBtn").onclick = savePin;
      document.getElementById("deletePinBtn").onclick = deletePin;

      // ---------- Klick på kartan: EN enda hanterare (view.on("click")) ----------
      // Tidigare fanns både "pointer-down" och "click"-hanterare som båda
      // reagerade på samma tryck, vilket gjorde att nålläget stängdes av sig
      // själv innan panelen hann öppnas ordentligt. Nu hanteras allt i en
      // enda händelse för att undvika dubbeltriggring.
      view.on("click", async e => {
        try { view.popup.close(); } catch(_) {}

        if (addPinMode) {
          pendingPinGeometry = e.mapPoint.clone().toJSON();
          selectedPinId = null;
          setPinMode(false);
          openPinPanelForNew(pendingPinGeometry);
          return;
        }

        const hit = await view.hitTest(e);
        const pinHit = hit.results.find(r => r.graphic && r.graphic.attributes && r.graphic.attributes.__type === "pin");
        if (pinHit) {
          openPinPanelForExisting(pinHit.graphic.attributes.id);
          return;
        }

        const areaHit = hit.results.find(r => r.graphic && r.graphic.layer === skotselLayer);
        if (areaHit) {
          selectedArea = areaHit.graphic;
          openAreaPanel(selectedArea);
        }
      });

      // Om användaren själv drar/nyper i kartan slår vi av auto-följning och
      // auto-rotation, precis som i Google Maps, så kartan inte "rycker"
      // tillbaka medan man tittar runt.
      view.on("drag", () => {
        if (followGps) {
          followGps = false;
          rotateWithHeading = false;
          document.getElementById("gpsBtn").classList.remove("gps-on");
        }
      });

      function createPinAtGps() {
        if (!lastGpsPoint) {
          showToast("Tryck Spåra eller GPS först och vänta på position");
          return;
        }
        selectedPinId = null;
        pendingPinGeometry = makeGpsGeometry(lastGpsPoint);
        openPinPanelForNew(pendingPinGeometry);
      }

      function makeGpsGeometry(p) {
        return { type:"point", longitude:p.lon, latitude:p.lat, spatialReference:{ wkid:4326 } };
      }

      function onGpsButtonTap() {
        followGps = true;
        rotateWithHeading = true;
        document.getElementById("gpsBtn").classList.add("gps-on");
        if (!tracking) startTrack();
        if (lastGpsPoint) {
          view.goTo({
            center:[lastGpsPoint.lon, lastGpsPoint.lat],
            scale: Math.min(view.scale || 900, 900)
          }, { animate:true, duration:400 }).catch(()=>{});
          showToast("Följer GPS");
        } else {
          showToast("Startar GPS… vänta på position");
        }
      }

      function openAreaPanel(g) {
        closePinPanel();
        const a = g.attributes || {};
        const id = a.OBJECTID;
        const saved = statuses[id];
        areaStatus = saved ? saved.status : "Ej klippt";

        document.getElementById("areaTitle").textContent = label(a.SUBTYP);
        document.getElementById("mId").textContent = id || "-";
        document.getElementById("mType").textContent = a.SUBTYP || "-";
        document.getElementById("mTeam").textContent = a.TEAM || a.Team || "-";
        document.getElementById("mDistrict").textContent = a.DISTRIKT || "-";
        document.getElementById("comment").value = saved ? saved.comment : "";
        markAreaStatus();
        document.getElementById("areaPanel").classList.add("open");
      }

      function closeAreaPanel() {
        document.getElementById("areaPanel").classList.remove("open");
        selectedArea = null;
      }

      function markAreaStatus() {
        document.querySelectorAll("[data-status]").forEach(b => {
          b.classList.toggle("active", b.dataset.status === areaStatus);
        });
      }

      function togglePinMode() { setPinMode(!addPinMode); }

      function setPinMode(v) {
        addPinMode = v;
        document.getElementById("pinBtn").classList.toggle("active", addPinMode);
        document.getElementById("pinHint").classList.toggle("show", addPinMode);
      }

      function openPinPanelForNew(geom) {
        closeAreaPanel();
        document.getElementById("pinTitle").textContent = "Ny nål";
        document.getElementById("pinSub").textContent = "Spara kommentar på vald plats";
        updatePinCoordsText(geom);
        document.getElementById("pinType").value = "Handjagare krävs";
        document.getElementById("pinComment").value = "";
        document.getElementById("pinStatus").value = "Öppen";
        document.getElementById("deletePinBtn").classList.add("hidden");
        document.getElementById("pinPanel").classList.add("open");
      }

      function openPinPanelForExisting(id) {
        const p = pins.find(x => x.id === id);
        if (!p) return;
        selectedPinId = id;
        pendingPinGeometry = p.geometry;

        closeAreaPanel();
        document.getElementById("pinTitle").textContent = p.type || "Egen nål";
        document.getElementById("pinSub").textContent = p.createdAt ? "Skapad: " + new Date(p.createdAt).toLocaleString("sv-SE") : "Sparad nål";
        updatePinCoordsText(p.geometry);
        document.getElementById("pinType").value = p.type || "Annat";
        document.getElementById("pinComment").value = p.comment || "";
        document.getElementById("pinStatus").value = p.status || "Öppen";
        document.getElementById("deletePinBtn").classList.remove("hidden");
        document.getElementById("pinPanel").classList.add("open");
      }

      function updatePinCoordsText(geom) {
        if (!geom) return;
        const x = geom.longitude ?? geom.x ?? "-";
        const y = geom.latitude ?? geom.y ?? "-";
        document.getElementById("pinX").textContent = typeof x === "number" ? x.toFixed(4) : x;
        document.getElementById("pinY").textContent = typeof y === "number" ? y.toFixed(4) : y;
      }

      function savePin() {
        if (!pendingPinGeometry) {
          showToast("Ingen plats vald för nålen");
          return;
        }

        const data = {
          id:selectedPinId || ("pin_" + Date.now()),
          geometry:pendingPinGeometry,
          type:document.getElementById("pinType").value,
          comment:document.getElementById("pinComment").value,
          status:document.getElementById("pinStatus").value,
          createdAt:selectedPinId ? (pins.find(x => x.id === selectedPinId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
          updatedAt:new Date().toISOString()
        };

        const ix = pins.findIndex(x => x.id === data.id);
        if (ix >= 0) pins[ix] = data;
        else pins.push(data);

        localStorage.setItem(PINS_KEY, JSON.stringify(pins));
        selectedPinId = data.id;
        redrawPins();
        showToast("Nål sparad");
        closePinPanel();
      }

      function deletePin() {
        if (!selectedPinId) return;
        if (!confirm("Ta bort denna nål?")) return;
        pins = pins.filter(x => x.id !== selectedPinId);
        localStorage.setItem(PINS_KEY, JSON.stringify(pins));
        redrawPins();
        showToast("Nål borttagen");
        closePinPanel();
      }

      function closePinPanel() {
        document.getElementById("pinPanel").classList.remove("open");
        selectedPinId = null;
        pendingPinGeometry = null;
      }

      function redrawPins() {
        const oldPins = view.graphics.items.filter(g => g.attributes && g.attributes.__type === "pin").toArray
          ? view.graphics.items.filter(g => g.attributes && g.attributes.__type === "pin").toArray()
          : view.graphics.items.filter(g => g.attributes && g.attributes.__type === "pin");
        oldPins.forEach(g => view.graphics.remove(g));

        for (const p of pins) {
          if (!p.geometry) continue;
          view.graphics.add(new Graphic({
            geometry:p.geometry,
            attributes:Object.assign({}, p, { __type:"pin" }),
            symbol:{
              type:"simple-marker",
              style:p.status === "Fixad" ? "diamond" : "circle",
              color: pinColor(p.type, p.status),
              size:24,
              outline:{ color:[255,255,255,1], width:3 }
            }
          }));
        }
      }

      function pinColor(type, status) {
        if (status === "Fixad") return [34,197,94,0.95];
        if (type === "Handjagare krävs") return [245,158,11,0.95];
        if (type === "Går ej klippa") return [239,68,68,0.95];
        if (type === "Hinder") return [168,85,247,0.95];
        return [56,189,248,0.95];
      }

      // ---------- GPS-spårning ----------
      function toggleTrack() { tracking ? stopTrack() : startTrack(); }

      function startTrack() {
        if (!navigator.geolocation) {
          showToast("GPS stöds inte");
          return;
        }
        tracking = true;
        document.getElementById("trackBtn").classList.add("tracking");
        document.getElementById("gpsDot").classList.remove("off");

        watchId = navigator.geolocation.watchPosition(onPos, err => {
          showToast("GPS-fel: " + err.message);
          stopTrack();
        }, { enableHighAccuracy:true, maximumAge:1000, timeout:8000 });

        if (typeof Android !== "undefined" && Android.startBackgroundTracking) {
          try { Android.startBackgroundTracking(); } catch(_) {}
        }

        showToast("Spårning startad");
      }

      function stopTrack() {
        tracking = false;
        followGps = false;
        rotateWithHeading = false;
        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
        watchId = null;
        document.getElementById("trackBtn").classList.remove("tracking");
        document.getElementById("gpsBtn").classList.remove("gps-on");
        document.getElementById("gpsDot").classList.add("off");

        if (typeof Android !== "undefined" && Android.stopBackgroundTracking) {
          try { Android.stopBackgroundTracking(); } catch(_) {}
        }

        showToast("Spårning stoppad");
      }

      function onPos(pos) {
        const c = pos.coords;
        const p = {
          lat:c.latitude,
          lon:c.longitude,
          accuracy:Math.round(c.accuracy || 0),
          heading: Number.isFinite(c.heading) ? c.heading : null,
          speed: Number.isFinite(c.speed) ? c.speed : null,
          time:new Date(pos.timestamp || Date.now()).toISOString()
        };

        document.getElementById("gpsInfo").textContent = "GPS: ±" + p.accuracy + " m";
        document.getElementById("statusLine").textContent = tracking
          ? ("Spårar · ±" + p.accuracy + " m")
          : ("GPS ±" + p.accuracy + " m");

        if (p.accuracy <= BAD_ACCURACY) {
          animateGpsTo(p);
          lastGpsPoint = p;

          // Kartrotation efter färdriktning, likt Google Maps. Endast när
          // användaren aktivt följer GPS (gpsBtn) och vi har en riktning
          // (antingen från kompassen eller beräknad ur rörelsen).
          if (p.heading !== null && p.speed !== null && p.speed > 0.5) {
            lastHeading = p.heading;
          }
          if (rotateWithHeading && lastHeading !== null) {
            view.rotation = 360 - lastHeading;
            document.getElementById("gpsIcon").style.transform = "rotate(" + (-(360 - lastHeading) + (360 - lastHeading)) + "deg)";
          }
          if (followGps) {
            view.goTo({ center:[p.lon, p.lat] }, { animate:false }).catch(()=>{});
          }
        }

        if (p.accuracy > GOOD_ACCURACY) {
          showGpsWarn("GPS osäker ±" + p.accuracy + " m – spår sparas ej");
          return;
        }

        const last = track[track.length - 1];
        if (last) {
          const d = distance(last.lat,last.lon,p.lat,p.lon);
          if (d > IMPOSSIBLE_JUMP_METERS && p.accuracy > 15) {
            showGpsWarn("GPS-hopp ignorerat");
            return;
          }
          if (d < MIN_TRACK_DISTANCE_METERS) return;
        }

        hideGpsWarn();
        track.push(p);
        localStorage.setItem(TRACK_KEY, JSON.stringify(track));
        redrawTrack();
      }

      // Mjuk animering av GPS-punkten mellan förra och nya positionen,
      // uppdaterad varje frame (requestAnimationFrame) i stället för att
      // hoppa direkt till den nya koordinaten. Ger ett flyt som känns
      // närmare Google Maps även om själva GPS-mätningarna kommer glesare.
      function animateGpsTo(p) {
        const newPoint = { type:"point", longitude:p.lon, latitude:p.lat, spatialReference:{ wkid:4326 } };

        if (!gpsGraphic) {
          gpsGraphic = new Graphic({
            geometry:newPoint,
            attributes:{ __type:"gps" },
            symbol:{
              type:"simple-marker",
              style:"circle",
              color:[56,189,248,1],
              size:20,
              outline:{ color:[255,255,255,1], width:4 }
            }
          });
          view.graphics.add(gpsGraphic);
          animFrom = { lon:p.lon, lat:p.lat };
          animTo = { lon:p.lon, lat:p.lat };
        } else {
          animFrom = animTo || { lon:p.lon, lat:p.lat };
          animTo = { lon:p.lon, lat:p.lat };
        }

        animStart = performance.now();
        if (animRAF) cancelAnimationFrame(animRAF);
        stepAnim();

        maybeRedrawAccuracy(p, newPoint);
      }

      function stepAnim() {
        const now = performance.now();
        const t = Math.min(1, (now - animStart) / ANIM_DURATION_MS);
        const ease = t < .5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; // easeInOutQuad
        const lon = animFrom.lon + (animTo.lon - animFrom.lon) * ease;
        const lat = animFrom.lat + (animTo.lat - animFrom.lat) * ease;

        if (gpsGraphic) {
          gpsGraphic.geometry = { type:"point", longitude:lon, latitude:lat, spatialReference:{ wkid:4326 } };
        }

        if (t < 1) {
          animRAF = requestAnimationFrame(stepAnim);
        }
      }

      function maybeRedrawAccuracy(p, point) {
        const now = performance.now();
        if (now - lastAccuracyDrawAt < ACCURACY_REDRAW_INTERVAL_MS) return;
        lastAccuracyDrawAt = now;

        try {
          const circle = geometryEngine.geodesicBuffer(point, Math.max(p.accuracy,5), "meters");
          if (accGraphic) {
            accGraphic.geometry = circle;
          } else {
            accGraphic = new Graphic({
              geometry:circle,
              attributes:{ __type:"gpsAccuracy" },
              symbol:{
                type:"simple-fill",
                color:[56,189,248,.10],
                outline:{ color:[56,189,248,.35], width:1.2 }
              }
            });
            view.graphics.add(accGraphic);
          }
        } catch(e) {}
      }

      function redrawTrack() {
        if (lineGraphic) trackLayer.remove(lineGraphic);
        if (track.length < 2) return;

        lineGraphic = new Graphic({
          geometry:new Polyline({
            paths:[track.map(p => [p.lon,p.lat])],
            spatialReference:{ wkid:4326 }
          }),
          symbol:{ type:"simple-line", color:[14,165,233,.9], width:4 }
        });

        trackLayer.add(lineGraphic);
      }

      function showGpsWarn(t) {
        const el = document.getElementById("gpsWarn");
        el.textContent = t;
        el.classList.add("show");
      }

      function hideGpsWarn() {
        document.getElementById("gpsWarn").classList.remove("show");
      }

      function distance(lat1,lon1,lat2,lon2) {
        const R = 6371000;
        const r = d => d * Math.PI / 180;
        const dLat = r(lat2-lat1);
        const dLon = r(lon2-lon1);
        const a = Math.sin(dLat/2)**2 + Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      }

      function label(v) {
        const m = {
          bruksgrasmatta:"Bruksgräsmatta",
          hogvuxen_grasyta_ang:"Högvuxen gräsyta/Äng",
          bruksgrasmatta_robot:"Bruksgräsmatta med robot",
          plantering:"Plantering",
          naturmark:"Naturmark",
          grasarmering:"Gräsarmering"
        };
        return m[v] || v || "Skötselyta";
      }

      let toastTimer;
      function showToast(t) {
        const el = document.getElementById("toast");
        el.textContent = t;
        el.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
      }
    });
  </script>
</body>
